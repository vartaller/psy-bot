<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Вибір часу</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h2 {
      font-size: 16px;
      font-weight: 500;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 32px;
      text-align: center;
      line-height: 1.4;
    }

    .picker {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .separator {
      font-size: 42px;
      font-weight: 300;
      color: var(--tg-theme-text-color, #000);
      line-height: 1;
      padding-bottom: 8px;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .unit button {
      width: 72px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      font-size: 22px;
      font-weight: 300;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .unit button:active { opacity: 0.7; }

    .value {
      font-size: 52px;
      font-weight: 200;
      min-width: 72px;
      text-align: center;
      line-height: 1;
      color: var(--tg-theme-text-color, #000);
    }

    .confirm-btn {
      width: 100%;
      max-width: 280px;
      height: 52px;
      border-radius: 14px;
      border: none;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .confirm-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <h2 id="title"></h2>

  <div class="picker">
    <div class="unit">
      <button onclick="change('h', 1)">+</button>
      <div class="value" id="hVal">00</div>
      <button onclick="change('h', -1)">−</button>
    </div>
    <div class="separator">:</div>
    <div class="unit">
      <button onclick="change('m', 5)">+</button>
      <div class="value" id="mVal">00</div>
      <button onclick="change('m', -5)">−</button>
    </div>
  </div>

  <button class="confirm-btn" id="okBtn" onclick="confirm()">OK</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.disableClosingConfirmation();

    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'tz';
    const lang = tg.initDataUnsafe?.user?.language_code || 'uk';

    const TITLES = {
      reminder: {
        uk: 'Оберіть час щоденного нагадування',
        ru: 'Выберите время ежедневного напоминания',
      },
      tz: {
        uk: 'Вкажіть, котра зараз у вас година і хвилини',
        ru: 'Укажите, сколько сейчас у вас часов и минут',
      },
    };

    const OK_LABELS = {
      uk: 'Готово',
      ru: 'Готово',
    };

    document.getElementById('title').textContent = (TITLES[mode] || TITLES.tz)[lang] || (TITLES[mode] || TITLES.tz).uk;
    document.getElementById('okBtn').textContent = OK_LABELS[lang] || 'OK';

    // For reminder: default 09:00; for tz: default to current local time
    let h, m;
    if (mode === 'reminder') {
      h = 9;
      m = 0;
    } else {
      const now = new Date();
      h = now.getHours();
      m = Math.round(now.getMinutes() / 5) * 5 % 60;
    }

    function render() {
      document.getElementById('hVal').textContent = String(h).padStart(2, '0');
      document.getElementById('mVal').textContent = String(m).padStart(2, '0');
    }

    function change(unit, delta) {
      if (unit === 'h') {
        h = (h + delta + 24) % 24;
      } else {
        m = (m + delta + 60) % 60;
      }
      render();
    }

    function confirm() {
      tg.sendData(JSON.stringify({ hour: h, minute: m }));
    }

    render();
  </script>
</body>
</html>
