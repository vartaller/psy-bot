name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: test:stub
      ENCRYPTION_SECRET: ci-secret-for-tests
      DATABASE_URL: postgresql://stub/stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Integration tests (tests/integration) are temporarily disabled on CI
      # due to a pytest-asyncio / asyncpg event-loop scoping issue. They still
      # exist in-repo and can be run locally against a Postgres DB by setting
      # TEST_DATABASE_URL. See tests/README.md.
      - name: Run unit tests
        run: pytest tests/unit -v
